name: Run Tests

on:
  # pull_request:
  #   types: [opened, synchronize, reopened]
  #   branches: [pre-prod, develop]
  push: 
    branches: [feat/automatization-test]
  jobs:
    test:
      runs-on: ubuntu-latest

      steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with: 
          node-version: '20'
        
        run: npm install

        run: npm run test
        

