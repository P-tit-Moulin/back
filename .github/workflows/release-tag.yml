name: Version, Tag, Release

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - pre-prod

jobs:
  versioning-and-release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      full_tag: ${{ steps.version.outputs.full_tag }}
      is_latest: ${{ steps.version.outputs.is_latest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version from package.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "CURRENT_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Get PR details and determine version type
        run: |
          PR_DATA=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.number }}")
          
          # Extraire le titre et le corps de la PR en gérant les caractères spéciaux
          PR_TITLE=$(echo "$PR_DATA" | jq -r '.title // ""' | tr -d '\n\r')
          PR_BODY=$(echo "$PR_DATA" | jq -r '.body // ""')
          
          # Sauvegarder le titre (sans caractères de fin de ligne)
          echo "PR_TITLE<<EOF" >> $GITHUB_ENV
          echo "$PR_TITLE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          # Sauvegarder le corps en base64 pour éviter les problèmes de caractères spéciaux
          PR_BODY_B64=$(echo "$PR_BODY" | base64 -w 0)
          echo "PR_BODY_B64=${PR_BODY_B64}" >> $GITHUB_ENV
          
          # Déterminer le type de version basé sur les tags dans le titre
          VERSION_TYPE=""
          if echo "$PR_TITLE" | grep -qi "#breakingchange\|#breaking\|#major"; then
            VERSION_TYPE="major"
          elif echo "$PR_TITLE" | grep -qi "#feat\|#feature\|#minor"; then
            VERSION_TYPE="minor"
          elif echo "$PR_TITLE" | grep -qi "#fix\|#hotfix\|#patch"; then
            VERSION_TYPE="patch"
          else
            # Par défaut, si aucun tag n'est trouvé, on fait un patch
            VERSION_TYPE="patch"
            echo "⚠️ Warning: No version tag found in PR title. Defaulting to patch version."
          fi
          
          echo "VERSION_TYPE=${VERSION_TYPE}" >> $GITHUB_ENV
          echo "🏷️ Detected version type: ${VERSION_TYPE}"
          echo "📝 PR Title: ${PR_TITLE}"

      - name: Increment version based on PR title tags
        id: increment_version
        run: |
          CURRENT_VERSION=${{ env.CURRENT_VERSION }}
          VERSION_TYPE=${{ env.VERSION_TYPE }}
          TARGET_BRANCH="${{ github.base_ref }}"
          
          # Nettoyer la version actuelle (retirer -pre-prod si présent)
          CLEAN_VERSION=$(echo $CURRENT_VERSION | sed 's/-pre-prod//')
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CLEAN_VERSION"
          
          # Incrémenter selon le type détecté
          case $VERSION_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              echo "🔥 Major version increment: ${MAJOR}.${MINOR}.${PATCH}"
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              echo "✨ Minor version increment: ${MAJOR}.${MINOR}.${PATCH}"
              ;;
            patch)
              PATCH=$((PATCH + 1))
              echo "🔧 Patch version increment: ${MAJOR}.${MINOR}.${PATCH}"
              ;;
          esac
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          
          # Déterminer la version complète selon la branche cible
          if [[ "$TARGET_BRANCH" == "pre-prod" ]]; then
            FULL_VERSION="${NEW_VERSION}-pre-prod"
            IS_LATEST="false"
          elif [[ "$TARGET_BRANCH" == "main" ]]; then
            FULL_VERSION="${NEW_VERSION}"
            IS_LATEST="true"
          fi
          
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV
          echo "IS_LATEST=$IS_LATEST" >> $GITHUB_ENV
          
          echo "📦 Final version: ${FULL_VERSION}"

      - name: Extract changelog from PR body
        run: |
          # Décoder le corps de la PR depuis base64
          PR_BODY=$(echo "${{ env.PR_BODY_B64 }}" | base64 -d)
          
          if echo "$PR_BODY" | grep -q "#changelog"; then
            CHANGELOG=$(echo "$PR_BODY" | sed -n '/#changelog/,$p' | sed '1d' | sed '/^[[:space:]]*$/d')
          else
            # Générer un changelog basé sur le type de version
            case ${{ env.VERSION_TYPE }} in
              major)
                CHANGELOG="- 🔥 Breaking changes in version ${{ env.FULL_VERSION }}"
                ;;
              minor)
                CHANGELOG="- ✨ New features in version ${{ env.FULL_VERSION }}"
                ;;
              patch)
                CHANGELOG="- 🔧 Bug fixes in version ${{ env.FULL_VERSION }}"
                ;;
            esac
          fi
          
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- Update to version ${{ env.FULL_VERSION }}"
          fi
          
          CHANGELOG_B64=$(echo "$CHANGELOG" | base64 -w 0)
          echo "CHANGELOG_B64=${CHANGELOG_B64}" >> $GITHUB_ENV

      - name: Update version in package.json
        id: version
        run: |
          jq --arg version "${{ env.FULL_VERSION }}" '.version = $version' package.json > tmp.json && mv tmp.json package.json
          
          echo "version=${{ env.NEW_VERSION }}" >> $GITHUB_OUTPUT
          echo "full_tag=${{ env.FULL_VERSION }}" >> $GITHUB_OUTPUT
          echo "is_latest=${{ env.IS_LATEST }}" >> $GITHUB_OUTPUT

      - name: Commit and push updated package.json
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          git add package.json
          git commit -m "Update version to ${{ env.FULL_VERSION }} [skip ci]"
          git push origin ${{ github.ref_name }}

      - name: Remove old latest tag
        if: env.IS_LATEST == 'true'
        run: |
          if git tag -l | grep -q "^latest$"; then
            git tag -d latest || true
            git push origin :refs/tags/latest || true
          fi

      - name: Create Git tags
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          git tag ${{ env.FULL_VERSION }}
          git push origin ${{ env.FULL_VERSION }}
          
          if [[ "${{ env.IS_LATEST }}" == "true" ]]; then
            git tag latest
            git push origin latest
          fi

      - name: Create GitHub Release
        run: |
          CHANGELOG_DECODED=$(echo "$CHANGELOG_B64" | base64 -d)
          
          # Déterminer l'icône selon le type de version
          case ${{ env.VERSION_TYPE }} in
            major) VERSION_ICON="🔥" ;;
            minor) VERSION_ICON="✨" ;;
            patch) VERSION_ICON="🔧" ;;
          esac
          
          # Récupérer le titre de la PR proprement
          PR_TITLE="${{ env.PR_TITLE }}"
          
          RELEASE_PAYLOAD=$(jq -n \
            --arg tag_name "${{ env.FULL_VERSION }}" \
            --arg name "${VERSION_ICON} Release ${{ env.FULL_VERSION }}" \
            --arg changelog "$CHANGELOG_DECODED" \
            --arg full_version "${{ env.FULL_VERSION }}" \
            --arg source_branch "${{ github.event.pull_request.head.ref }}" \
            --arg target_branch "${{ github.base_ref }}" \
            --arg pr_author "${{ github.event.pull_request.user.login }}" \
            --arg version_type "${{ env.VERSION_TYPE }}" \
            --arg pr_title "$PR_TITLE" \
            --arg is_latest_str "$([[ "${{ env.IS_LATEST }}" == "true" ]] && echo "true" || echo "false")" \
            --argjson prerelease "$([[ "${{ env.IS_LATEST }}" != "true" ]] && echo true || echo false)" \
            '{
              tag_name: $tag_name,
              name: $name,
              body: ("## 📋 Changelog\n\n" + $changelog + "\n\n## 🏷️ Tags\n- **Version**: `" + $full_version + "`" + (if ($is_latest_str == "true") then "\n- **Latest**: `latest`" else "" end) + "\n\n## 📦 Docker Package\n\n```bash\n# Pull specific version\ndocker pull ghcr.io/baptiste-ferrand/template-release:" + $full_version + (if ($is_latest_str == "true") then "\n# Pull latest stable\ndocker pull ghcr.io/baptiste-ferrand/template-release:latest" else "" end) + "\n```\n\n## ℹ️ Information\n\n- **PR Title**: `" + $pr_title + "`\n- **Version Type**: " + $version_type + " (" + (if ($version_type == "major") then "🔥 Breaking Changes" elif ($version_type == "minor") then "✨ New Features" else "🔧 Bug Fixes" end) + ")\n- **Source branch**: `" + $source_branch + "`\n- **Target branch**: `" + $target_branch + "`\n- **Release type**: " + (if ($is_latest_str == "true") then "**Stable** 🎯" else "**Pre-production** 🧪" end) + "\n- **PR author**: @" + $pr_author),
              prerelease: $prerelease,
              make_latest: $is_latest_str
            }')
          
          echo "🚀 Creating release with payload:"
          echo "$RELEASE_PAYLOAD" | jq '.'
          
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "$RELEASE_PAYLOAD")
          
          echo "🎯 GitHub API Response:"
          echo "$RESPONSE" | jq '.'
          
          if echo "$RESPONSE" | jq -e '.html_url' > /dev/null; then
            RELEASE_URL=$(echo "$RESPONSE" | jq -r '.html_url')
            echo "✅ Release created successfully: $RELEASE_URL"
          else
            echo "❌ Failed to create release"
            echo "$RESPONSE"
            exit 1
          fi